
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración - MiStream</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:20px;
    text-align:center;
}

.contenedor{
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>Panel de Administración</h1>
</header>

<div class="contenedor">

<h2>Subir nuevo vídeo</h2>

<input type="text" placeholder="Título del vídeo">

<textarea placeholder="Descripción"></textarea>

<input type="text" placeholder="URL de la portada">

<input type="text" placeholder="URL del vídeo">

<button>Guardar vídeo</button>

</div>
<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];

const boton = document.querySelector("button");
const inputs = document.querySelectorAll("input");
const descripcion = document.querySelector("textarea");

boton.onclick = function(){

    const titulo = inputs[0].value;
    const portada = inputs[1].value;
    const video = inputs[2].value;
    const texto = descripcion.value;

    if(!titulo || !portada || !video){
        alert("Completa todos los campos.");
        return;
    }

    videos.push({
        titulo: titulo,
        descripcion: texto,
        portada: portada,
        video: video
    });

    localStorage.setItem("videos", JSON.stringify(videos));

    alert("¡Vídeo guardado correctamente!");

    inputs[0].value="";
    inputs[1].value="";
    inputs[2].value="";
    descripcion.value="";
};

</script>
</body>
</html>
