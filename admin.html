
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración - MiStream</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:20px;
    text-align:center;
}

.contenedor{
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>Panel de Administración</h1>
</header>

<div class="contenedor">

<h2>Subir nuevo vídeo</h2>

<input type="text" placeholder="Título del vídeo">

<textarea placeholder="Descripción"></textarea>

<input type="text" placeholder="URL de la portada">

<input type="text" placeholder="URL del vídeo">

<button>Guardar vídeo</button>

</div>

</body>
</html>
