<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiStream</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

header{
  background:#000;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
}

.contenedor{
  padding:20px;
}

.card{
  background:#222;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

.info{
  padding:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff0050;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<header>
  <h1>🎬 MiStream</h1>
  <p>Tu plataforma de vídeos</p>
</header>

<div class="contenedor">

  <div class="card">
    <img src="https://picsum.photos/600/300" alt="Portada">

    <div class="info">
      <h2>Mi primera serie</h2>
      <p>Próximamente...</p>

      <button>Episodios</button>
    </div>
  </div>

</div>

</body>
</html>
